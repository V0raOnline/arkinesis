id: optica_espejo
titulo: Óptica — Espejo esférico
renderer: optica_espejo
descripcion: >
  Un espejo esférico forma imágenes por reflexión. En el espejo cóncavo
  los rayos convergen hacia el foco real. En el convexo divergen como si
  procediesen de un foco virtual situado detrás del espejo.

descripcion_corta: >
  El espejo esférico forma imágenes reales o virtuales según la posición
  del objeto. La ecuación de Gauss es la misma que en lentes: 1/f = 1/sₒ + 1/sᵢ.
  El signo de f distingue cóncavo (+) de convexo (−).

formula_simbolica: "1/f = 1/sₒ + 1/sᵢ     A = −sᵢ/sₒ     f = R/2"

formula_resuelta: "sᵢ = {si} cm     A = {A}     R = {R} cm"

variables:
  so:
    label: Distancia objeto sₒ
    unidad: cm
    min: 5
    max: 300
    step: 5
    default: 90
  f:
    label: Focal |f|
    unidad: cm
    min: 10
    max: 150
    step: 5
    default: 40
  ho:
    label: Altura objeto hₒ
    unidad: cm
    min: 1
    max: 40
    step: 1
    default: 20

constantes: {}

connections:
  - when: A < -1
    priority: 100
    text: >-
      Los telescopios reflectores usan espejos concavos para ampliar imagenes de objetos lejanos. El espejo primario del telescopio Hubble tiene 2.4 metros de diametro.
  - when: si < 0
    priority: 90
    text: >-
      Los retrovisores de los coches son espejos convexos que forman imagenes virtuales. Reducen el tamano pero amplian el campo de vision lateral.
  - when: R < 20
    priority: 80
    text: >-
      Los espejos dentales y los de laringoscopia tienen radios de curvatura muy pequenos para ampliar zonas de dificil acceso sin distorsion.
  - when: A > 1
    priority: 70
    text: >-
      Los espejos de maquillaje y afeitado son concavos con focal larga: amplian la imagen cuando el objeto esta entre el foco y el espejo.

formulas:
  - id: si
    label: Distancia imagen sᵢ
    expr: "1 / (1/f - 1/so)"
    unidad: cm
    destacado: true
  - id: A
    label: Ampliación A
    expr: "-(1 / (1/f - 1/so)) / so"
    unidad: ""
    destacado: true
  - id: hi
    label: Altura imagen hᵢ
    expr: "ho * (-(1 / (1/f - 1/so)) / so)"
    unidad: cm
  - id: R
    label: Radio de curvatura R
    expr: "f * 2"
    unidad: cm
