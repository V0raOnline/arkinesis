id: optica_lente
titulo: Óptica geométrica — Lente delgada
renderer: optica_lente
descripcion: >
  Una lente delgada forma una imagen del objeto según la ecuación
  de Gauss. La distancia focal determina si la lente es convergente
  (f > 0) o divergente (f < 0). La imagen puede ser real o virtual,
  derecha o invertida.

descripcion_corta: >
  Una lente delgada forma una imagen real o virtual según la posición
  del objeto respecto al foco. La potencia (dioptrías) mide la capacidad
  de refracción. La ampliación indica tamaño y orientación de la imagen.

formula_simbolica: "1/f = 1/sₒ + 1/sᵢ     A = −sᵢ/sₒ     P = 1/f"

formula_resuelta: "1/{f} = 1/{so} + 1/sᵢ → sᵢ = {si} cm     A = {A}     P = {P} D"

variables:
  f:
    label: Distancia focal f
    unidad: cm
    min: -100
    max: 100
    step: 1
    default: 20
  so:
    label: Distancia objeto
    unidad: cm
    min: 5
    max: 200
    step: 1
    default: 40
  ho:
    label: Altura objeto
    unidad: cm
    min: 1
    max: 30
    step: 1
    default: 8

constantes: {}

connections:
  - when: P > 10
    priority: 100
    text: >-
      Las lupas y los microscopios opticos usan lentes convergentes de focal muy corta y alta potencia. Un microscopio optico puede alcanzar 1000 dioptrías combinando varias lentes.
  - when: si < 0
    priority: 90
    text: >-
      Las gafas para miopes usan lentes divergentes que forman imagen virtual. La potencia negativa indica cuánto deben corregir la vision.
  - when: A < -1
    priority: 80
    text: >-
      Los proyectores de cine y los videoproyectores forman imagenes reales ampliadas en una pantalla. El objeto esta justo mas alla del foco para maximizar la ampliacion.
  - when: P > 0 && P < 5
    priority: 70
    text: >-
      Las gafas de lectura tienen potencias bajas. Con 1 o 2 dioptrías corrigen la presbicia sin distorsion apreciable en el campo visual.

nota: >
  ⚠ f > 0 → lente convergente · f < 0 → lente divergente.
  Imagen real (s_i > 0): se forma al otro lado de la lente, puede proyectarse.
  Imagen virtual (s_i < 0): se forma en el mismo lado que el objeto, no proyectable.

formulas:
  - id: si
    label: Distancia imagen
    expr: "1 / (1/f - 1/so)"
    unidad: cm
    latex: "\\frac{1}{s_i} = \\frac{1}{f} - \\frac{1}{s_o}"
    destacado: true
  - id: A
    label: Ampliación lateral
    expr: "si / so * -1"
    unidad: ""
    latex: "A = -\\frac{s_i}{s_o}"
    destacado: true
  - id: hi
    label: Altura imagen
    expr: "ho * A"
    unidad: cm
    latex: "h_i = h_o \\cdot A"
  - id: P
    label: Potencia
    expr: "1 / (f / 100)"
    unidad: D
    latex: "P = \\frac{1}{f}"
