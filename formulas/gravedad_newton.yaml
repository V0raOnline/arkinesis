id: gravedad_newton
titulo: Ley de Gravitación Universal
renderer: gravedad_newton
descripcion: >
  Dos masas se atraen con una fuerza proporcional al producto
  de sus masas e inversamente proporcional al cuadrado de la distancia.

descripcion_corta: >
  Dos masas orbitan su baricentro común bajo atracción gravitatoria.
  La fuerza depende del producto de masas y del cuadrado de la distancia.
  El período crece con la distancia y disminuye con la masa central.

formula_simbolica: "F = G·m₁·m₂ / r²     T = 2π·√(r³ / G·m₁)"

formula_resuelta: "F = {F} N     T = {T} s     v = {v_orb} m/s"

variables:
  m1:
    label: Masa 1
    unidad: "×10²⁴ kg"
    min: 0.1
    max: 200.0
    step: 0.1
    default: 5.97
    escala: 1e24
  m2:
    label: Masa 2
    unidad: "×10²⁴ kg"
    min: 0.1
    max: 200.0
    step: 0.1
    default: 7.34
    escala: 1e24
  r:
    label: Distancia (semieje mayor)
    unidad: "×10⁸ m"
    min: 1
    max: 100
    step: 0.5
    default: 3.84
    escala: 1e8
  e:
    label: Excentricidad
    unidad: ""
    min: 0.0
    max: 0.95
    step: 0.01
    default: 0.0

constantes:
  G:
    label: Constante gravitacional
    valor: 6.674e-11
    unidad: "N·m²/kg²"

nota: >
  ⚠ Los cálculos asumen órbita circular (e = 0) y distancia r constante.
  La excentricidad modifica solo la visualización. Para órbitas elípticas
  reales, F varía a lo largo de la trayectoria (segundo curso).

formulas:
  - id: F
    label: Fuerza gravitacional
    expr: "G * m1 * m2 / (r * r)"
    unidad: N
    latex: "F = G\\frac{m_1 m_2}{r^2}"
    destacado: true
  - id: T
    label: Período orbital
    expr: "2 * PI * sqrt(r * r * r / (G * m1))"
    unidad: s
    latex: "T = 2\\pi\\sqrt{\\frac{r^3}{Gm_1}}"
    destacado: true
  - id: v_orb
    label: Velocidad orbital circular
    expr: "sqrt(G * m1 / r)"
    unidad: "m/s"
    latex: "v = \\sqrt{\\frac{Gm_1}{r}}"
