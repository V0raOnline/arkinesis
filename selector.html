<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARKINESIS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap');

:root {
  --bg:       #080b14;
  --surface:  #0d1220;
  --border:   #1a2540;
  --accent:   #00e5ff;
  --accent2:  #ff4d6d;
  --accent3:  #a8ff3e;
  --text:     #c8d8f0;
  --muted:    #4a5a7a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  height: 100vh;
  display: grid;
  grid-template-rows: 52px 1fr 36px;
  overflow: hidden;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0 1.2rem;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}

.logo {
  display: flex;
  align-items: center;
  flex-shrink: 0;
}
.logo img { height: 34px; width: auto; display: block; }

#formula-titulo {
  font-size: 0.92rem;
  font-weight: 600;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

select#formula-selector {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  background: var(--bg);
  color: var(--accent);
  border: 1px solid var(--border);
  padding: 0.3rem 0.5rem;
  cursor: pointer;
  outline: none;
  letter-spacing: 0.04em;
}
select#formula-selector:hover { border-color: var(--accent); }

.hdr-btn {
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.28rem 0.65rem;
  cursor: pointer;
  letter-spacing: 0.07em;
  transition: all 0.2s;
  white-space: nowrap;
  text-decoration: none;
}
.hdr-btn:hover         { border-color: var(--accent3); color: var(--accent3); }
.hdr-btn.reset:hover   { border-color: var(--accent2); color: var(--accent2); }
.hdr-btn.home:hover    { border-color: var(--accent);  color: var(--accent); }
.hdr-btn.copied        { border-color: var(--accent3); color: var(--accent3); }

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 1fr 290px;
  overflow: hidden;
}

/* ── Canvas area ── */
.canvas-area {
  display: grid;
  grid-template-rows: 1fr 130px;
  padding: 0.8rem;
  gap: 0.8rem;
  overflow: hidden;
}

.canvases {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
  min-height: 0;
}

.canvas-box {
  position: relative;
  border: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
}
.canvas-box canvas {
  display: block;
  width: 100%;
  height: 100%;
}
.canvas-label {
  position: absolute;
  top: 0.5rem;
  left: 0.7rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  pointer-events: none;
}
.canvas-label span { color: var(--accent); }

/* ── Caja inferior ── */
.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
  min-height: 0;
}

.info-box {
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 0.7rem 0.9rem;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 0.35rem;
}

.info-box-label {
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
}

.info-desc {
  font-size: 0.76rem;
  color: var(--text);
  line-height: 1.5;
  opacity: 0.75;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.info-formula-simbolica {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  color: var(--accent);
  letter-spacing: 0.04em;
  margin-top: auto;
  flex-shrink: 0;
}

/* Caja derecha — solución */
.info-box-right {
  justify-content: center;
}

.formula-display {
  font-family: 'Space Mono', monospace;
  font-size: 0.76rem;
  color: var(--accent);
  line-height: 1.7;
  flex: 1;
  display: flex;
  align-items: center;
}

.formula-display.solucion {
  color: var(--accent3);
}

.btn-solucion {
  position: absolute;
  top: 0.5rem;
  right: 0.7rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.58rem;
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 0.2rem 0.55rem;
  cursor: pointer;
  letter-spacing: 0.07em;
  transition: all 0.2s;
  flex-shrink: 0;
}
.btn-solucion:hover        { border-color: var(--accent3); color: var(--accent3); }
.btn-solucion.activo       { border-color: var(--accent3); color: var(--accent3); }

/* ── Panel derecho ── */
.panel {
  border-left: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-track { background: transparent; }
.panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.panel-section {
  padding: 0.9rem 1.1rem;
  border-bottom: 1px solid var(--border);
}
.panel-section h3 {
  font-family: 'Space Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.85rem;
}

.slider-row { margin-bottom: 0.9rem; }
.slider-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.3rem;
}
.slider-name { font-size: 0.84rem; color: var(--text); }
.slider-val {
  font-family: 'Space Mono', monospace;
  font-size: 0.76rem;
  color: var(--accent);
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 2px;
  background: var(--border);
  outline: none;
  cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 11px; height: 11px;
  background: var(--accent);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--accent);
}

.nota-info {
  background: rgba(255,107,53,0.06);
  border-left: 2px solid rgba(255,107,53,0.5);
  padding: 0.5rem 0.7rem;
  margin-bottom: 0.7rem;
  font-size: 0.76rem;
  color: rgba(200,216,240,0.6);
  line-height: 1.5;
  font-style: italic;
}

#resultados-container { display: grid; gap: 0.5rem; }

.result-item {
  padding: 0.5rem 0.7rem;
  background: rgba(255,255,255,0.02);
  border-left: 2px solid var(--accent);
}
.result-item.highlight {
  border-left-color: var(--accent3);
  background: rgba(168,255,62,0.04);
}
.result-name {
  font-family: 'Space Mono', monospace;
  font-size: 0.64rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.15rem;
}
.result-value {
  font-family: 'Space Mono', monospace;
  font-size: 0.86rem;
  color: var(--accent);
  font-weight: 700;
}
.result-item.highlight .result-value { color: var(--accent3); }
.result-unit { font-size: 0.72rem; font-weight: 400; color: var(--muted); }

/* ── Footer ── */
footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 1.2rem;
  border-top: 1px solid var(--border);
  font-family: 'Space Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
}
.legend { display: flex; gap: 0.8rem; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 0.3rem; font-size: 0.68rem; }
.dot { width: 6px; height: 6px; border-radius: 50%; }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="logo.png" alt="ARKINESIS"></div>
  <div id="formula-titulo">Cargando…</div>
  <select id="formula-selector"></select>
  <button class="hdr-btn reset" id="btn-reset">↺ reset</button>
  <button class="hdr-btn" id="btn-copy-url">⎘ copiar enlace</button>
  <a class="hdr-btn home" href="index.html">⌂ inicio</a>
  <a class="hdr-btn" href="about.html">? about</a>
</header>

<div class="main">

  <!-- Canvas + caja info -->
  <div class="canvas-area">
    <div class="canvases">
      <div class="canvas-box">
        <div class="canvas-label">Vista <span>A</span></div>
        <canvas id="canvas-main"></canvas>
      </div>
      <div class="canvas-box">
        <div class="canvas-label">Vista <span>B</span></div>
        <canvas id="canvas-secondary"></canvas>
      </div>
    </div>

    <!-- Fila inferior -->
    <div class="info-row">

      <!-- Izquierda: descripción + fórmula simbólica -->
      <div class="info-box">
        <div class="info-box-label">descripción</div>
        <div class="info-desc" id="info-desc-text"></div>
        <div class="info-formula-simbolica" id="info-formula-sim"></div>
      </div>

      <!-- Derecha: fórmula con valores -->
      <div class="info-box info-box-right">
        <div class="info-box-label">fórmula</div>
        <button class="btn-solucion" id="btn-solucion">mostrar solución</button>
        <div class="formula-display" id="formula-display"></div>
      </div>

    </div>
  </div>

  <!-- Panel -->
  <div class="panel">
    <div class="panel-section">
      <h3>Parámetros</h3>
      <div id="sliders-container"></div>
    </div>
    <div class="panel-section">
      <h3>Resultados</h3>
      <div id="nota-container"></div>
      <div id="resultados-container"></div>
    </div>
  </div>

</div>

<footer>
  <span id="footer-id">ARKINESIS</span>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:#ff6b35"></div>partícula</div>
    <div class="legend-item"><div class="dot" style="background:#00e5ff"></div>trayectoria</div>
    <div class="legend-item"><div class="dot" style="background:#a8ff3e"></div>campo</div>
    <div class="legend-item"><div class="dot" style="background:#ff4d6d"></div>fuerza/vel</div>
  </div>
</footer>

<script>
// ── formatNum (duplicada de motor.js para uso independiente) ────────────────
function formatNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs === 0) return '0';
  const exp = Math.floor(Math.log10(abs));
  if (Math.abs(exp) >= 3) {
    const m = (n / Math.pow(10, exp)).toFixed(2);
    const sup = String(exp).split('').map(c => '⁰¹²³⁴⁵⁶⁷⁸⁹⁻'['0123456789-'.indexOf(c)] || c).join('');
    return `${m} × 10${sup}`;
  }
  return n.toPrecision(3);
}

// ── Estado solución ───────────────────────────────────────────────────────────
let _solucionVisible = false;
let _ultimaFormulaSim = '';
let _ultimaFormulaRes = '';

function mostrarFormulaSim() {
  _solucionVisible = false;
  const el = document.getElementById('formula-display');
  const btn = document.getElementById('btn-solucion');
  if (el) { el.textContent = _ultimaFormulaSim; el.classList.remove('solucion'); }
  if (btn) { btn.textContent = 'mostrar solución'; btn.classList.remove('activo'); }
}

function actualizarCajaInfo(formula, resultados) {
  // Descripción
  const descEl = document.getElementById('info-desc-text');
  if (descEl) descEl.textContent = formula.descripcion_corta || formula.descripcion || '';

  // Fórmula simbólica
  const simEl = document.getElementById('info-formula-sim');
  _ultimaFormulaSim = formula.formula_simbolica || '';
  if (simEl) simEl.textContent = _ultimaFormulaSim;

  // Fórmula resuelta — sustituir {id} por valores (resultados + sliders)
  let resuelta = formula.formula_resuelta || '';
  if (resuelta) {
    const valores = (window._State && window._State.valores) || {};
    resuelta = resuelta.replace(/\{(\w+)\}/g, (_, id) => {
      // Primero busca en resultados calculados, luego en valores de sliders
      const fromRes = resultados && resultados[id];
      if (fromRes !== null && fromRes !== undefined) return formatNum(fromRes);
      const fromSlider = valores[id];
      if (fromSlider !== null && fromSlider !== undefined) return formatNum(fromSlider);
      return '—';
    });
  }
  _ultimaFormulaRes = resuelta;

  // Si la solución estaba visible, actualizar en tiempo real
  if (_solucionVisible) {
    const el = document.getElementById('formula-display');
    if (el) el.textContent = _ultimaFormulaRes;
  } else {
    const el = document.getElementById('formula-display');
    if (el) el.textContent = _ultimaFormulaSim;
  }
}

// Botón mostrar solución
document.addEventListener('DOMContentLoaded', () => {
  const btn = document.getElementById('btn-solucion');
  if (btn) {
    btn.addEventListener('click', () => {
      _solucionVisible = !_solucionVisible;
      if (_solucionVisible) {
        const el = document.getElementById('formula-display');
        if (el) { el.textContent = _ultimaFormulaRes; el.classList.add('solucion'); }
        btn.textContent = 'ocultar solución';
        btn.classList.add('activo');
      } else {
        mostrarFormulaSim();
      }
    });
  }
});

// Reset
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!window._State || !window._State.formula) return;
  const formula = window._State.formula;
  for (const [key, config] of Object.entries(formula.variables)) {
    window._State.valores[key] = config.default;
    const slider = document.getElementById('sl-' + key);
    const valEl  = document.getElementById('val-' + key);
    if (slider) slider.value = config.default;
    if (valEl)  valEl.textContent = config.default + ' ' + config.unidad;
  }
  mostrarFormulaSim();
  const params = new URLSearchParams();
  params.set('formula', formula.id);
  history.replaceState(null, '', '?' + params.toString());
});

// Copiar enlace
document.getElementById('btn-copy-url').addEventListener('click', () => {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('btn-copy-url');
    btn.textContent = '✓ copiado';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '⎘ copiar enlace';
      btn.classList.remove('copied');
    }, 2000);
  });
});

// Exponer para motor.js
window._actualizarCajaInfo = actualizarCajaInfo;
window._mostrarFormulaSim  = mostrarFormulaSim;
</script>

<script src="motor.js"></script>
</body>
</html>
